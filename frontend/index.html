<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeIQ — Learn to Trade with AI-Powered Insights</title>
  <meta name="description" content="TradeIQ is an educational paper-trading platform for learning stock trading strategies, technical analysis, and risk management." />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <!-- Chart.js 4.x -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Socket.io client -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/lessons.css" />
</head>
<body>
  <div id="app">
    <!-- All content is injected here by app.js -->
    <div class="empty-state" style="padding-top: 80px;">
      <span class="spinner"></span> Loading TradeIQ...
    </div>
  </div>

  <!-- App modules (load order matters: api/auth first, then feature modules, then app last) -->
  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/lessons.js"></script>
  <script src="js/aiTrader.js"></script>
  <script src="js/myDesk.js"></script>
  <script src="js/research.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
